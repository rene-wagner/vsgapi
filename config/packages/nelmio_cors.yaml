nelmio_cors:
    defaults:
        origin_regex: false
        allow_origin: ['%page_content.iframe_url%']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PUT', 'PATCH', 'DELETE']
        allow_headers: ['Content-Type', 'Authorization', 'X-CSRF-Token']
        allow_credentials: true
        expose_headers: ['Link']
        max_age: 3600
    paths:
        '^/api/': null
