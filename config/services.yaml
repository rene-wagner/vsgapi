# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    media.storage_dir: '%kernel.project_dir%/var/media'
    media.max_upload_bytes: 10485760
    media.thumbnail_max_edge: 320
    page_content.iframe_url: '%env(PAGE_CONTENT_IFRAME_URL)%'
    embed.token_secret: '%env(EMBED_TOKEN_SECRET)%'
    embed.token_ttl: '%env(int:EMBED_TOKEN_TTL)%'
    embed.token_audience: '%env(EMBED_TOKEN_AUDIENCE)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Controller\MediaFileServeController:
        arguments:
            $mediaStorageDir: '%media.storage_dir%'
            $thumbnailMaxEdge: '%media.thumbnail_max_edge%'

    App\Service\Media\MediaUploadService:
        arguments:
            $storageDir: '%media.storage_dir%'
            $maxUploadBytes: '%media.max_upload_bytes%'
            $thumbnailMaxEdge: '%media.thumbnail_max_edge%'

    App\Service\Media\MediaDeleteService:
        arguments:
            $storageDir: '%media.storage_dir%'

    App\Service\Media\MediaCopyService:
        arguments:
            $storageDir: '%media.storage_dir%'

    App\Serializer\MediaItemNormalizer:
        tags:
            - { name: serializer.normalizer, priority: 64 }

    App\Service\Embed\PageContentEmbedUrlBuilder:
        arguments:
            $iframeUrl: '%page_content.iframe_url%'

    App\Service\Embed\EmbedTokenIssuer:
        arguments:
            $secret: '%embed.token_secret%'
            $ttl: '%embed.token_ttl%'
            $audience: '%embed.token_audience%'

    App\Service\Embed\EmbedTokenVerifier:
        arguments:
            $secret: '%embed.token_secret%'
            $audience: '%embed.token_audience%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
